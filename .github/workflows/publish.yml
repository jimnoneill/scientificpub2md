name: Publish to PyPI

# Builds the sdist + wheel and publishes to PyPI when a GitHub Release is published.
# Uses PyPI Trusted Publishing (OIDC) — no API token/secret needed once the trusted
# publisher is configured on PyPI (see PUBLISHING.md).

on:
  release:
    types: [published]
  workflow_dispatch: {}   # allow manual runs (e.g. to TestPyPI) from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Check metadata
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    # Only publish on an actual Release (not manual dispatch).
    if: github.event_name == 'release'
    environment:
      name: pypi
      url: https://pypi.org/p/scientificpub2md
    permissions:
      id-token: write       # required for trusted publishing
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
